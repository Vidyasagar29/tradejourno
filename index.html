<!DOCTYPE html>
<html>
<head>
    <title>Trading Journal Dashboard</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Trading Journal</h1>
<div class="subtitle">Auto refresh every 30 seconds</div>

<div class="card" style="display: flex; align-items: center; gap: 10px; flex-wrap: wrap;">
    <label for="symbolFilter" style="font-size: 12px; text-transform: uppercase; letter-spacing: 0.6px; color: #555;">Symbol Filter</label>
    <select id="symbolFilter" style="padding: 6px 10px; border: 1px solid #ddd; background: #fff;">
        <option value="ALL">All Symbols</option>
    </select>
</div>

<div id="content">Loading...</div>

<script>
let selectedUnderlying = "ALL";
let latestEngineResult = { closedTrades: [], openPositions: [] };

function updateSymbolFilter(underlyings) {
    const select = document.getElementById("symbolFilter");
    const uniqueSorted = Array.from(new Set(underlyings)).sort();
    const prevSelection = selectedUnderlying;

    let options = '<option value="ALL">All Symbols</option>';
    uniqueSorted.forEach(sym => {
        options += `<option value="${sym}">${sym}</option>`;
    });
    select.innerHTML = options;

    if (prevSelection !== "ALL" && uniqueSorted.includes(prevSelection)) {
        selectedUnderlying = prevSelection;
    } else {
        selectedUnderlying = "ALL";
    }
    select.value = selectedUnderlying;
}

function renderWithFilter() {
    const filteredClosed = selectedUnderlying === "ALL"
        ? latestEngineResult.closedTrades
        : latestEngineResult.closedTrades.filter(t => t.underlying === selectedUnderlying);

    const filteredOpen = selectedUnderlying === "ALL"
        ? latestEngineResult.openPositions
        : latestEngineResult.openPositions.filter(p => p.underlying === selectedUnderlying);

    renderTables(filteredClosed, filteredOpen);
}

function fetchGoogleLink() {
    fetch("tradejourno.txt")
        .then(res => res.text())
        .then(link => fetchData(link.trim()))
        .catch(err => {
            document.getElementById("content").innerHTML =
                "<div class='card'>Error loading tradejourno.txt: " + err + "</div>";
        });
}

function fetchData(sheetURL) {
    fetch(sheetURL)
        .then(res => res.text())
        .then(csv => processCSV(csv))
        .catch(err => {
            document.getElementById("content").innerHTML =
                "<div class='card'>Error loading Google Sheet: " + err + "</div>";
        });
}

function processCSV(csv) {

    const rows = csv.trim().split(/\r?\n/);
    const headers = rows[0].split(/,|\t/).map(h => h.trim());

    const getIndex = name => headers.findIndex(h => h.toUpperCase() === name.toUpperCase());

    const idxDate = getIndex("Date");
    const idxUnderlying = getIndex("Underlying");
    const idxStrike = getIndex("Strike");
    const idxType = getIndex("Type");
    const idxExpiry = getIndex("Expiry");
    const idxAction = getIndex("Action");
    const idxQty = getIndex("Qty");
    const idxPrice = getIndex("Price");

    const requiredIndexes = [idxDate, idxUnderlying, idxStrike, idxType, idxExpiry, idxAction, idxQty, idxPrice];
    if (requiredIndexes.some(idx => idx === -1)) {
        document.getElementById("content").innerHTML =
            "<div class='card'>Missing required columns. Required: Date, Underlying, Strike, Type, Expiry, Action, Qty, Price.</div>";
        return;
    }

    const trades = [];

    rows.slice(1).forEach(row => {

        const cols = row.split(/,|\t/);
        if (cols.length < headers.length) return;

        const qty = parseInt(cols[idxQty], 10);
        const price = parseFloat(cols[idxPrice]);
        if (!Number.isFinite(qty) || !Number.isFinite(price) || qty <= 0) return;

        trades.push({
            date: cols[idxDate].trim(),
            underlying: cols[idxUnderlying].trim().toUpperCase(),
            strike: cols[idxStrike].trim(),
            type: cols[idxType].trim().toUpperCase(),
            expiry: cols[idxExpiry].trim(),
            action: cols[idxAction].trim().toUpperCase(),
            qty: qty,
            price: price
        });
    });

    latestEngineResult = buildPositionEngine(trades);
    updateSymbolFilter(trades.map(t => t.underlying));
    renderWithFilter();
}

function buildPositionEngine(trades) {

    const positions = {};
    const closedTrades = [];

    trades.forEach(trade => {

        const key = trade.underlying + "_" +
                    trade.strike + "_" +
                    trade.type + "_" +
                    trade.expiry;

        if (!positions[key]) {
            positions[key] = {
                underlying: trade.underlying,
                strike: trade.strike,
                type: trade.type,
                expiry: trade.expiry,
                qty: 0,
                side: null,
                avgEntryPrice: 0,
                entryDate: null
            };
        }

        const pos = positions[key];
        const tradeSide = trade.action === "BUY" ? "LONG" : "SHORT";

        if (pos.qty === 0) {
            pos.qty = trade.qty;
            pos.side = tradeSide;
            pos.avgEntryPrice = trade.price;
            pos.entryDate = trade.date;
            return;
        }

        if (pos.side === tradeSide) {
            const totalCost = (pos.avgEntryPrice * pos.qty) + (trade.price * trade.qty);
            pos.qty += trade.qty;
            pos.avgEntryPrice = totalCost / pos.qty;
            return;
        }

        const closingQty = Math.min(pos.qty, trade.qty);
        const pnl = pos.side === "LONG"
            ? (trade.price - pos.avgEntryPrice) * closingQty
            : (pos.avgEntryPrice - trade.price) * closingQty;

        closedTrades.push({
            underlying: trade.underlying,
            strike: trade.strike,
            type: trade.type,
            expiry: trade.expiry,
            side: pos.side,
            entryDate: pos.entryDate,
            exitDate: trade.date,
            qty: closingQty,
            entryPrice: pos.avgEntryPrice,
            exitPrice: trade.price,
            pnl: pnl
        });

        pos.qty -= closingQty;

        const remainingQty = trade.qty - closingQty;
        if (pos.qty === 0) {
            if (remainingQty > 0) {
                pos.qty = remainingQty;
                pos.side = tradeSide;
                pos.avgEntryPrice = trade.price;
                pos.entryDate = trade.date;
            } else {
                pos.side = null;
                pos.avgEntryPrice = 0;
                pos.entryDate = null;
            }
        }
    });

    const openPositions = Object.values(positions).filter(p => p.qty > 0);
    return { closedTrades, openPositions };
}

function renderTables(trades, openPositions) {

    const grouped = {};
    let grandTotal = 0;

    trades.forEach(t => {

        if (!grouped[t.underlying]) {
            grouped[t.underlying] = {
                LONG: { CE: [], PE: [] },
                SHORT: { CE: [], PE: [] },
                total: 0,
                open: { CE: [], PE: [] }
            };
        }

        if (!grouped[t.underlying][t.side][t.type]) grouped[t.underlying][t.side][t.type] = [];
        grouped[t.underlying][t.side][t.type].push(t);
        grouped[t.underlying].total += t.pnl;
        grandTotal += t.pnl;
    });

    openPositions.forEach(p => {
        if (!grouped[p.underlying]) {
            grouped[p.underlying] = {
                LONG: { CE: [], PE: [] },
                SHORT: { CE: [], PE: [] },
                total: 0
            };
        }
    });

    let html = `
        <div class="card">
            <div class="section-title">Overall Realized Performance</div>
            <div class="summary-value ${grandTotal >= 0 ? 'profit':'loss'}">
                Rs ${grandTotal.toFixed(2)}
            </div>
        </div>
    `;

    const underlyings = Object.keys(grouped);

    html += `<div class="card"><div class="side-title">Open Positions (All Symbols)</div>`;

    ["CE", "PE"].forEach(optType => {
        const typeLabel = optType === "CE" ? "Calls" : "Puts";
        const typeOpen = openPositions.filter(p => p.type === optType);

        html += `<div class="side-title">${typeLabel}</div>
                 <table>
                    <thead>
                        <tr>
                            <th>Underlying</th>
                            <th>Strike</th>
                            <th>Type</th>
                            <th>Expiry</th>
                            <th>Side</th>
                            <th>Open Qty</th>
                            <th>Avg Entry</th>
                            <th>Entry Date</th>
                        </tr>
                    </thead>
                    <tbody>`;

        if (typeOpen.length === 0) {
            html += `<tr><td colspan="8">No open ${typeLabel.toLowerCase()}.</td></tr>`;
        } else {
            typeOpen.forEach(p => {
                html += `
                <tr>
                    <td>${p.underlying}</td>
                    <td>${p.strike}</td>
                    <td>${p.type}</td>
                    <td>${p.expiry}</td>
                    <td>${p.side}</td>
                    <td>${p.qty}</td>
                    <td>${p.avgEntryPrice.toFixed(2)}</td>
                    <td>${p.entryDate}</td>
                </tr>
                `;
            });
        }

        html += `</tbody></table>`;
    });

    html += `</div>`;

    if (underlyings.length === 0) {
        html += `<div class="card"><div class="side-title">No closed trades yet.</div></div>`;
        document.getElementById("content").innerHTML = html;
        return;
    }

    underlyings.forEach(underlying => {

        const underlyingTotal = grouped[underlying].total;

        html += `<div class="card">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; flex-wrap: wrap; gap: 10px;">
                        <div class="underlying-title">${underlying}</div>
                        <div style="text-align: right;">
                            <div style="font-weight: 400; font-size: 9px; color: #999; letter-spacing: 0.4px; text-transform: uppercase; margin-bottom: 2px;">Realized P&L</div>
                            <div class="summary-value ${underlyingTotal >= 0 ? 'profit':'loss'}">
                                Rs ${underlyingTotal.toFixed(2)}
                            </div>
                        </div>
                    </div>`;

        ["LONG", "SHORT"].forEach(side => {

            html += `<div class="side-title">${side} Closed Trades</div>`;

            ["CE", "PE"].forEach(optType => {
                const typeLabel = optType === "CE" ? "Calls" : "Puts";
                const typeTrades = grouped[underlying][side][optType] || [];

                html += `<div class="side-title">${typeLabel}</div>`;
                html += `
                <table>
                    <thead>
                        <tr>
                            <th>Underlying</th>
                            <th>Strike</th>
                            <th>Type</th>
                            <th>Expiry</th>
                            <th>Entry Date</th>
                            <th>Exit Date</th>
                            <th>Qty</th>
                            <th>Entry</th>
                            <th>Exit</th>
                            <th>P&L</th>
                        </tr>
                    </thead>
                    <tbody>
                `;

                if (typeTrades.length === 0) {
                    html += `<tr><td colspan="10">No closed ${side.toLowerCase()} ${typeLabel.toLowerCase()} yet.</td></tr>`;
                } else {
                    typeTrades.forEach(t => {
                        html += `
                        <tr>
                            <td>${t.underlying}</td>
                            <td>${t.strike}</td>
                            <td>${t.type}</td>
                            <td>${t.expiry}</td>
                            <td>${t.entryDate}</td>
                            <td>${t.exitDate}</td>
                            <td>${t.qty}</td>
                            <td>${t.entryPrice.toFixed(2)}</td>
                            <td>${t.exitPrice.toFixed(2)}</td>
                            <td class="${t.pnl >= 0 ? 'profit':'loss'}">
                                ${t.pnl.toFixed(2)}
                            </td>
                        </tr>
                        `;
                    });
                }

                html += `</tbody></table>`;
            });
        });

        html += `</div>`;
    });

    document.getElementById("content").innerHTML = html;
}

fetchGoogleLink();
setInterval(fetchGoogleLink, 30000);
document.getElementById("symbolFilter").addEventListener("change", function() {
    selectedUnderlying = this.value;
    renderWithFilter();
});

</script>

</body>
</html>
